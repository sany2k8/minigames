# ──────────────────────────────────────────────────────────────────────────────
# CI — Type-check, Test & Build
#
# Runs on every push and pull request targeting main.
# Ensures TypeScript compiles, all Vitest tests pass, and the production
# Vite build succeeds before code is merged.
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc -b --noEmit

      - name: Run tests
        run: npm run test

      - name: Build production bundle
        run: npm run build
        env:
          # Provide empty Supabase vars so Vite doesn't fail on missing env.
          # Real values are injected at deploy time.
          VITE_SUPABASE_URL: ""
          VITE_SUPABASE_PUBLISHABLE_KEY: ""
